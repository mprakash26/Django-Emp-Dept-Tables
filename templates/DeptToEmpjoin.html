<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1>Display-Dept-To-Emp</h1>
        {% for DEO in ADEO %}

            <h1>{{DEO.dname}} {{DEO.deptno}} {{DEO.loc}}</h1>

            <table border="3px">
                <tr>
                    <th>ename</th>
                    <th>empno</th>
                    <th>job</th>
                    <th>sal</th>
                </tr>

                {% for EO in DEO.emp_set.all %}
                <tr>
                    <td>{{EO.ename}}</td>
                    <td>{{EO.empno}}</td>
                    <td>{{EO.job}}</td>
                    <td>{{EO.sal}}</td>
                </tr>
                {% endfor %}
            </table>

        {% endfor %}
    </center>
</body>
</html>
